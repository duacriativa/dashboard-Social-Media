<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Inter',sans-serif;min-height:100vh}
button{cursor:pointer;font-family:'Inter',sans-serif}
a{color:inherit;text-decoration:none}
nav{background:#111;border-bottom:1px solid #222;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}

.chip{background:rgba(96,200,245,.12);border:1px solid rgba(96,200,245,.3);border-radius:99px;padding:4px 12px 4px 5px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#60C8F5}
.av{width:22px;height:22px;border-radius:50%;background:#60C8F5;color:#000;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;flex-shrink:0}
.ibtn{background:#1a1a1a;border:1px solid #333;border-radius:7px;color:#f0f0f0;padding:6px 10px;font-size:13px}
.ibtn:hover{background:#222}
.week-row{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1a1a}
.wnav{display:flex;align-items:center;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden}
.wnav button{background:none;border:none;color:#888;padding:6px 12px;font-size:16px}
.wnav button:hover{background:#222;color:#fff}
.wlbl{font-size:13px;font-weight:600;padding:0 10px;white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.stat{background:#141414;border:1px solid #222;border-radius:10px;padding:12px 14px}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#666;margin-bottom:4px}
.sv{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.ca{color:#60C8F5}.cy{color:#F5E642}.cg{color:#22C55E}.cw{color:#F59E0B}
.prog{padding:0 16px 12px}
.pt{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:6px}
.pt b{color:#f0f0f0}
.pb{height:4px;background:#1a1a1a;border-radius:99px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#60C8F5,#F5E642);border-radius:99px;transition:width .5s}
.lbtns{display:flex;gap:8px;padding:0 16px 12px}
.lbtn{flex:1;padding:10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;color:#f0f0f0;font-size:13px;font-weight:600}
.lbtn:hover{background:#222}
.main{padding:0 16px 60px}
.client{background:#141414;border:1px solid #222;border-radius:12px;margin-bottom:10px;overflow:hidden}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:none;border:none;width:100%;text-align:left;color:#f0f0f0}
.chdr:hover{background:#1a1a1a}
.cl{display:flex;align-items:center;gap:10px}
.cdot{width:8px;height:8px;border-radius:50%;background:#60C8F5;flex-shrink:0}
.cnm{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.02em}
.csub{font-size:11px;color:#666;margin-top:1px}
.cbadge{background:rgba(96,200,245,.12);color:#60C8F5;border:1px solid rgba(96,200,245,.25);font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}
.cbody{display:none;border-top:1px solid #222}
.cbody.open{display:block}
.mae{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin:10px 12px;overflow:hidden}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:none;border:none;width:100%;text-align:left;color:#f0f0f0}
.mhdr:hover{background:rgba(255,255,255,.03)}
.mnm{font-size:14px;font-weight:600;margin-bottom:3px}
.mmeta{display:flex;align-items:center;gap:6px}
.sp{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;text-transform:uppercase}
.sp-plan{background:rgba(245,158,11,.15);color:#F59E0B}
.sp-design{background:rgba(167,139,250,.15);color:#A78BFA}
.sp-out{background:rgba(255,255,255,.06);color:#666}
.mcnt{font-size:11px;color:#666}
.mbody{display:none;border-top:1px solid #222}
.mbody.open{display:block}
.sitem{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;color:#f0f0f0}
.sitem:hover{background:rgba(255,255,255,.03)}
.sitem:last-of-type{border-bottom:none}
.sico{color:#60C8F5;font-size:14px;flex-shrink:0}
.sbody{flex:1;min-width:0}
.snm{font-size:13px;font-weight:500;margin-bottom:3px;line-height:1.3}
.stags{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tdate{font-size:11px;color:#666}
.tdate.x{color:#EF4444}
.tmidia{font-size:11px;color:#60C8F5}
.tmidia.x{color:#EF4444}
.sav{width:22px;height:22px;border-radius:50%;background:#60C8F5;color:#000;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:10px;flex-shrink:0}
.addsub{display:flex;align-items:center;gap:8px;padding:11px 14px;background:none;border:none;border-top:1px solid rgba(255,255,255,.04);width:100%;text-align:left;color:#666;font-size:13px}
.addsub:hover{color:#f0f0f0;background:rgba(255,255,255,.03)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:20}
.overlay.open{display:block}
.panel{position:fixed;bottom:0;left:0;right:0;background:#111;border-radius:18px 18px 0 0;border:1px solid #2a2a2a;z-index:21;min-height:72vh;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom,16px)}
.panel.open{transform:translateY(0)}
.handle{width:36px;height:4px;background:#333;border-radius:99px;margin:12px auto 0}
.pbody{padding:16px 20px 24px}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:22px;margin-bottom:4px}
.psub{font-size:12px;color:#60C8F5;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.08em}
.fg input,.fg select,.fg textarea{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;font-size:14px;color:#f0f0f0;font-family:'Inter',sans-serif;outline:none;width:100%;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#60C8F5}
.fg select option{background:#1a1a1a}
.fg textarea{resize:none;min-height:80px;line-height:1.5}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tinput{width:100%;background:none;border:none;border-bottom:2px solid #2a2a2a;outline:none;font-size:20px;font-weight:700;color:#f0f0f0;font-family:'Inter',sans-serif;padding-bottom:10px;margin-bottom:16px}
.tinput::placeholder{color:#444}
.tinput:focus{border-bottom-color:#60C8F5}
.pacts{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.pbtn{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;border:none;font-family:'Inter',sans-serif}
.pb-save{background:#60C8F5;color:#000}
.pb-design{background:rgba(167,139,250,.12);color:#A78BFA;border:1px solid rgba(167,139,250,.3) !important}
.pb-dup{background:#1a1a1a;color:#f0f0f0;border:1px solid #2a2a2a !important}
.pb-del{background:rgba(239,68,68,.08);color:#EF4444;border:1px solid rgba(239,68,68,.25) !important}
.pb-cancel{background:none;color:#666;border:1px solid #2a2a2a !important}
.ao{display:flex;align-items:center;gap:12px;padding:13px;background:#1a1a1a;border:2px solid #2a2a2a;border-radius:10px;margin-bottom:8px;width:100%;text-align:left;color:#f0f0f0;font-size:15px;font-weight:600}
.ao:hover,.ao.sel{border-color:#60C8F5;background:rgba(96,200,245,.08)}
.ao-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ao-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;flex-shrink:0}
.ao-chk{margin-left:auto;color:#60C8F5;display:none}
.ao.sel .ao-chk{display:block}
.ifield{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-bottom:1px solid #1a1a1a}
.ifield:last-child{border-bottom:none}
.iflbl{font-size:12px;color:#666;min-width:90px;flex-shrink:0;margin-top:1px}
.ifval{font-size:13px;color:#f0f0f0;font-weight:500;flex:1;line-height:1.5}
.ibox{background:#1a1a1a;border:1px solid #222;border-radius:10px;margin-bottom:14px;overflow:hidden}
.descbox{background:#1a1a1a;border:1px solid #222;border-radius:10px;padding:14px;margin-bottom:14px}
.desclbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.desctxt{font-size:14px;color:#f0f0f0;line-height:1.7;white-space:pre-wrap}
.lrow{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #1a1a1a}
.lrow:last-child{border-bottom:none}
.lnm{font-size:14px;font-weight:700}
.lopen{display:flex;align-items:center;gap:6px;background:rgba(96,200,245,.1);border:1px solid rgba(96,200,245,.25);border-radius:8px;padding:7px 12px;font-size:13px;color:#60C8F5;font-weight:600}
.lopen:hover{background:rgba(96,200,245,.2)}
.undo{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);opacity:0;background:#111;border:1px solid #333;border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:30;transition:all .3s;pointer-events:none;min-width:min(300px,88vw)}
.undo.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:all}
.umsg{font-size:13px;flex:1}
.ubtn{background:none;border:1px solid rgba(96,200,245,.3);border-radius:7px;color:#60C8F5;font-size:12px;font-weight:700;padding:5px 12px}
.uprog{position:absolute;bottom:0;left:0;height:3px;background:#60C8F5;border-radius:0 0 12px 12px}
.cfg-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:40;align-items:center;justify-content:center;padding:20px}
.cfg-bg.open{display:flex}
.cfg{background:#111;border:1px solid #2a2a2a;border-radius:16px;padding:24px;width:100%;max-width:360px}
.cfg h3{font-family:'Bebas Neue',sans-serif;font-size:24px;margin-bottom:6px}
.cfg p{font-size:13px;color:#666;margin-bottom:16px;line-height:1.6}
.cfgin{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:11px 12px;font-size:14px;color:#f0f0f0;outline:none;font-family:'Inter',sans-serif;margin-bottom:12px}
.cfgin:focus{border-color:#60C8F5}
.cfgacts{display:flex;gap:8px;justify-content:flex-end}
.cbtn{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #333;background:none;color:#f0f0f0}
.cbtn.s{background:#60C8F5;color:#000;border-color:#60C8F5;font-weight:700}
.empty{text-align:center;padding:48px 20px;color:#444;font-size:14px;line-height:1.8}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #2a2a2a;border-top-color:#60C8F5;border-radius:50%;animation:sp .7s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(min-width:600px){
  .panel{left:auto;right:0;top:0;bottom:0;max-width:420px;max-height:100vh;border-radius:0;transform:translateX(100%)}
  .panel.open{transform:translateX(0)}
  .handle{display:none}
}
</style>
</head>
<body>

<nav>
  <div class="brand">DUA<span>*.*</span></div>
  <div class="nav-r">
    <div class="chip"><div class="av">CI</div>Ciane</div>
    <button class="ibtn" id="sync-btn" onclick="syncData()">↻</button>
    <button class="ibtn" onclick="openCfg()">🔑</button>
  </div>
</nav>

<div class="week-row">
  <div class="wnav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="wlbl" id="wlbl">—</span>
    <button onclick="changeWeek(1)">›</button>
  </div>
  <span style="font-size:11px;color:#666">Ter → Seg</span>
</div>

<div class="stats">
  <div class="stat"><div class="sl">Clientes</div><div class="sv ca" id="s-cli">—</div></div>
  <div class="stat"><div class="sl">Posts</div><div class="sv cy" id="s-posts">—</div></div>
  <div class="stat"><div class="sl">Agendados</div><div class="sv cg" id="s-ag">—</div></div>
  <div class="stat"><div class="sl">Pendentes</div><div class="sv cw" id="s-pend">—</div></div>
</div>

<div class="prog">
  <div class="pt"><b>Progresso</b><span id="prog-pct">0%</span></div>
  <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
</div>

<div class="lbtns">
  <button class="lbtn" onclick="openLinks('stories')">📁 Links Stories</button>
  <button class="lbtn" onclick="openLinks('feed')">📁 Links Feed</button>
</div>

<div class="main" id="main"></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="panel" id="panel">
  <div class="handle"></div>
  <div class="pbody" id="pbody"></div>
</div>

<div class="cfg-bg" id="cfg-bg">
  <div class="cfg">
    <h3>ClickUp Token</h3>
    <p>Cole seu token pessoal. Fica salvo no navegador.</p>
    <input class="cfgin" type="password" id="cfg-tok" placeholder="pk_...">
    <div class="cfgacts">
      <button class="cbtn" onclick="closeCfg()">Cancelar</button>
      <button class="cbtn s" onclick="saveCfg()">Salvar</button>
    </div>
  </div>
</div>

<div class="undo" id="undo">
  <span class="umsg" id="umsg"></span>
  <button class="ubtn" onclick="doUndo()">↩ Desfazer</button>
  <div class="uprog" id="uprog" style="width:100%"></div>
</div>

<script>
const MID='112051792';
const TK_DEFAULT='pk_112051792_FUCWZ5VF68LDBXXBPMXH8H2CEZEND1DR';
const LISTS={'Amiche':'901324613220','Naromo':'901324682471','Marry Blue':'901324682343','Tchu Bi':'901324505493','Aya':'901326685391','Kyrefh Jeans':'901324682326','Nina & Noz':'901324682520','Del Carmen':'901324614474','Flora Minha':'901324682301'};
const CLIENTS=['Amiche','Naromo','Marry Blue','Tchu Bi','Aya','Kyrefh Jeans','Nina & Noz','Del Carmen','Flora Minha'];
const DESIGNERS=[{id:'112051788',nm:'Alexia Cruz',color:'#A78BFA',init:'AL'},{id:'112051786',nm:'Luana Vieira',color:'#F472B6',init:'LU'},{id:'112051789',nm:'Isadora',color:'#34D399',init:'IS'},{id:'112051792',nm:'Ciane',color:'#60C8F5',init:'CI'}];
const IGN=['agendamento','concluído','concluido','done','complete'];

let tok=localStorage.getItem('cu_tok_ciane')||TK_DEFAULT;
let wOff=0,data={},cache={},mc={},oc={},om={},sid=null,mid2=null,cli=null,da=null,ut=null,ua=null;

const f2=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
const fts=ts=>ts?new Date(parseInt(ts)).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):null;
const t2i=ts=>ts?new Date(parseInt(ts)).toISOString().split('T')[0]:'';

function getWeek(o=0){const t=new Date(),d=t.getDay();let diff=d-2;if(diff<0)diff+=7;const tue=new Date(t);tue.setDate(t.getDate()-diff+o*7);tue.setHours(0,0,0,0);const mon=new Date(tue);mon.setDate(tue.getDate()+6);return{s:tue,e:mon};}
function rWeek(){const{s,e}=getWeek(wOff);document.getElementById('wlbl').textContent=`${f2(s)} → ${f2(e)}`;}
function changeWeek(d){wOff+=d;rWeek();syncData();}

const B='https://api.clickup.com/api/v2';
async function GET(p){const r=await fetch(B+p,{headers:{Authorization:tok}});if(!r.ok)throw new Error(r.status);return r.json();}
async function POST(p,b){const r=await fetch(B+p,{method:'POST',headers:{Authorization:tok,'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok){const e=await r.json();throw new Error(e.err||r.status);}return r.json();}
async function PUT(p,b){const r=await fetch(B+p,{method:'PUT',headers:{Authorization:tok,'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok){const e=await r.json();throw new Error(e.err||r.status);}return r.json();}
async function DEL(p){await fetch(B+p,{method:'DELETE',headers:{Authorization:tok}});}

function pCF(fields){
  const r={midia:null,funil:null,mes:null};
  for(const f of fields){
    const n=(f.name||'').toLowerCase().trim();
    // Tenta pegar valor de dropdown, texto ou número
    let v=null;
    if(f.type==='drop_down'||f.type==='labels'){
      v=f.type_config?.options?.find(o=>o.id===f.value)?.name||null;
    } else if(f.type==='date'&&f.value){
      v=new Date(parseInt(f.value)).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    } else {
      v=f.value||null;
    }
    if(!v)continue;
    if(n.includes('mídia')||n.includes('midia')||n.includes('media'))r.midia=String(v);
    if(n==='funil'||n.includes('funil'))r.funil=String(v);
    if(n.includes('mês')||n.includes('mes')||n.includes('month'))r.mes=String(v);
  }
  return r;
}

async function syncData(){
  if(!tok){openCfg();return;}
  document.getElementById('main').innerHTML='<div class="empty"><div class="spin"></div><br>Buscando tarefas…</div>';
  document.getElementById('sync-btn').textContent='…';
  data={};cache={};mc={};
  await Promise.all(CLIENTS.map(async c=>{
    const lid=LISTS[c];if(!lid)return;
    try{
      const[r1,r2]=await Promise.all([GET(`/list/${lid}/task?include_closed=false`),GET(`/list/${lid}/task?subtasks=true&include_closed=false`)]);
      const all=r2.tasks||[];
      const ms=(r1.tasks||[]).filter(t=>{const st=(t.status?.status||'').toLowerCase(),nm=t.name.toLowerCase();return !nm.includes('[template]')&&!nm.includes('template')&&(st.includes('planejamento')||st.includes('planning'))&&!t.parent;});
      for(const m of ms){
        const subs=all.filter(t=>{const st=(t.status?.status||'').toLowerCase();return t.parent===m.id&&!IGN.some(s=>st.includes(s))&&!t.name.toLowerCase().includes('[template]');}).sort((a,b)=>(a.due_date?parseInt(a.due_date):Infinity)-(b.due_date?parseInt(b.due_date):Infinity));
        mc[m.id]={id:m.id,name:m.name,status:m.status?.status||'',due_date:m.due_date,description:m.description||'',assignees:m.assignees||[],client:c,listId:lid};
        for(const s of subs){const cf=pCF(s.custom_fields||[]);cache[s.id]={id:s.id,name:s.name,status:s.status?.status||'',ddr:s.due_date,midia:cf.midia,funil:cf.funil,mes:cf.mes,desc:s.description||'',client:c,pid:m.id,lid};}
        data[c]=data[c]||[];data[c].push({m,subs});
      }
    }catch(e){console.warn(c,e.message);}
  }));
  document.getElementById('sync-btn').textContent='↻';
  rStats();rList();toast('Atualizado!','ok');
}

function rStats(){
  let p=0,ag=0;const cl=CLIENTS.filter(c=>data[c]?.length);
  for(const c of cl)for(const g of data[c]){p+=g.subs.length;ag+=g.subs.filter(s=>{const st=(s.status?.status||'').toLowerCase();return st.includes('agendamento')||st.includes('conclu');}).length;}
  document.getElementById('s-cli').textContent=cl.length;
  document.getElementById('s-posts').textContent=p;
  document.getElementById('s-ag').textContent=ag;
  document.getElementById('s-pend').textContent=p-ag;
  const pct=p?Math.round(ag/p*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('pf').style.width=pct+'%';
}

function rList(){
  const el=document.getElementById('main');
  const cl=CLIENTS.filter(c=>data[c]?.length);
  if(!cl.length){el.innerHTML='<div class="empty">Nenhuma tarefa de planejamento encontrada.</div>';return;}
  el.innerHTML=cl.map(c=>{
    const gs=data[c]||[],isOpen=oc[c]!==false,tot=gs.reduce((a,g)=>a+g.subs.length,0);
    return`<div class="client">
      <button class="chdr" onclick="tC('${c}')">
        <div class="cl"><div class="cdot"></div><div><div class="cnm">${c}</div><div class="csub">${gs.length} tarefa(s) · ${tot} post(s)</div></div></div>
        <div style="display:flex;align-items:center;gap:8px"><span class="cbadge">${tot}</span><span style="color:#444;font-size:14px">${isOpen?'▼':'▶'}</span></div>
      </button>
      <div class="cbody ${isOpen?'open':''}">
        ${gs.map(({m,subs})=>{
          const st=(m.status?.status||'').toLowerCase(),stc=st.includes('planejamento')?'sp-plan':st.includes('design')?'sp-design':'sp-out',mO=om[m.id]!==false;
          return`<div class="mae">
            <button class="mhdr" onclick="tM('${m.id}')">
              <div><div class="mnm">${m.name}</div><div class="mmeta"><span class="sp ${stc}">${m.status?.status||'—'}</span><span class="mcnt">${subs.length} post(s)</span></div></div>
              <div style="display:flex;align-items:center;gap:8px">
                <button onclick="event.stopPropagation();oMI('${m.id}')" style="background:none;border:1px solid #333;border-radius:6px;color:#888;padding:4px 8px;font-size:11px">ℹ</button>
                <span style="color:#444;font-size:14px">${mO?'▼':'▶'}</span>
              </div>
            </button>
            <div class="mbody ${mO?'open':''}">
              ${subs.map(s=>{
                const cf=pCF(s.custom_fields||[]),dt=fts(s.due_date),st2=(s.status?.status||'').toLowerCase(),stc2=st2.includes('planejamento')?'sp-plan':st2.includes('design')?'sp-design':'sp-out';
                return`<button class="sitem" onclick="oSP('${s.id}')">
                  <span class="sico">✎</span>
                  <div class="sbody"><div class="snm">${s.name}</div><div class="stags"><span class="tdate ${!dt?'x':''}">${dt||'sem data'}</span><span class="tmidia ${!cf.midia?'x':''}">${cf.midia||'sem mídia'}</span><span class="sp ${stc2}" style="font-size:9px">${s.status?.status||'—'}</span></div></div>
                  <div class="sav">CI</div><span style="color:#444;font-size:14px">›</span>
                </button>`;
              }).join('')}
              <button class="addsub" onclick="oAP('${m.id}','${c}')">+ Adicionar post</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function tC(n){oc[n]=oc[n]===false?true:false;rList();}
function tM(id){om[id]=om[id]===false?true:false;rList();}

function oPanel(h){document.getElementById('pbody').innerHTML=h;document.getElementById('overlay').classList.add('open');document.getElementById('panel').classList.add('open');}
function closePanel(){document.getElementById('overlay').classList.remove('open');document.getElementById('panel').classList.remove('open');}

function oSP(id){
  sid=id;const s=cache[id];if(!s)return;
  const M=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  oPanel(`<div class="psub">${s.client}</div>
    <input class="tinput" id="se-nm" value="${s.name.replace(/"/g,'&quot;')}" placeholder="Título">
    <div class="fgrow">
      <div class="fg"><label>Data</label><input type="date" id="se-dt" value="${t2i(s.ddr)}"></div>
      <div class="fg"><label>Mídia</label><select id="se-mi"><option value="">—</option>${['Stories','Feed','Reels','TikTok','Carrossel'].map(m=>`<option ${s.midia===m?'selected':''}>${m}</option>`).join('')}</select></div>
    </div>
    <div class="fgrow">
      <div class="fg"><label>Funil</label><select id="se-fu"><option value="">—</option>${['Topo','Meio','Fundo'].map(f=>`<option ${s.funil===f?'selected':''}>${f}</option>`).join('')}</select></div>
      <div class="fg"><label>Mês</label><select id="se-ms">${M.map(m=>`<option ${s.mes===m?'selected':''}>${m}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><label>Descrição</label><textarea id="se-dc" placeholder="Observações…">${s.desc||''}</textarea></div>
    <div class="pacts">
      <button class="pbtn pb-save" onclick="saveSub()">💾 Salvar</button>
      <button class="pbtn pb-design" onclick="oDsP()">→ Enviar para Design</button>
      <button class="pbtn pb-dup" onclick="oDuP()">⧉ Duplicar</button>
      <button class="pbtn pb-del" onclick="delSub()">🗑 Excluir</button>
      <button class="pbtn pb-cancel" onclick="closePanel()">Cancelar</button>
    </div>`);
}

async function saveSub(){
  const id=sid,nm=document.getElementById('se-nm')?.value?.trim();
  if(!nm){toast('Preencha o título','err');return;}
  const dt=document.getElementById('se-dt')?.value,dc=document.getElementById('se-dc')?.value||'';
  try{toast('Salvando…');await PUT(`/task/${id}`,{name:nm,description:dc,due_date:dt?new Date(dt).getTime():undefined});closePanel();toast('Salvo!','ok');await syncData();}
  catch(e){toast('Erro: '+e.message,'err');}
}

function delSub(){const id=sid,s=cache[id];closePanel();sUndo(`"${s?.name}" excluído`,async()=>{await DEL(`/task/${id}`);await syncData();});}

function oDsP(){
  const s=cache[sid];
  oPanel(`<div class="ptitle">→ Design</div><div style="font-size:13px;color:#666;margin-bottom:16px">${s?.name||''}</div>
    ${DESIGNERS.map(d=>`<button class="ao" id="ao-${d.id}" onclick="sDs('${d.id}')"><div class="ao-dot" style="background:${d.color}"></div><div class="ao-av" style="background:${d.color};color:#000">${d.init}</div>${d.nm}<span class="ao-chk">✓</span></button>`).join('')}
    <div class="pacts" style="margin-top:16px">
      <button class="pbtn pb-save" onclick="cDs()">→ Confirmar</button>
      <button class="pbtn pb-cancel" onclick="oSP('${sid}')">← Voltar</button>
    </div>`);
  da=null;
}
function sDs(id){da=id;document.querySelectorAll('.ao').forEach(e=>e.classList.remove('sel'));document.getElementById('ao-'+id)?.classList.add('sel');}
async function cDs(){
  if(!da){toast('Selecione um designer','err');return;}
  const id=sid,s=cache[id];closePanel();
  sUndo(`"${s?.name}" → Design`,async()=>{await PUT(`/task/${id}`,{status:'design',assignees:{add:[parseInt(da)],rem:[]}});await syncData();});
}

function oDuP(){
  const s=cache[sid];
  oPanel(`<div class="ptitle">⧉ Duplicar</div>
    <div class="fg"><label>Novo título</label><input type="text" id="dup-nm" value="${(s?.name||'').replace(/"/g,'&quot;')} (cópia)"></div>
    <div class="fg"><label>Nova data <span style="color:#EF4444">*</span></label><input type="date" id="dup-dt"></div>
    <div class="pacts" style="margin-top:16px">
      <button class="pbtn pb-save" onclick="cDu()">⧉ Criar</button>
      <button class="pbtn pb-cancel" onclick="oSP('${sid}')">← Voltar</button>
    </div>`);
}
async function cDu(){
  const dt=document.getElementById('dup-dt')?.value,nm=document.getElementById('dup-nm')?.value?.trim();
  if(!dt){toast('Informe a data','err');return;}if(!nm){toast('Informe o título','err');return;}
  const s=cache[sid];closePanel();
  sUndo(`"${nm}" duplicado`,async()=>{await POST(`/list/${s.lid}/task`,{name:nm,parent:s.pid,assignees:[parseInt(MID)],due_date:new Date(dt).getTime(),description:s.desc||'',status:'planejamento'});await syncData();});
}

function oAP(pid,c){
  mid2=pid;cli=c;
  const M=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],mes=new Date().getMonth();
  oPanel(`<div class="ptitle">+ Novo post</div><div class="psub">${c}</div>
    <input class="tinput" id="add-nm" placeholder="Título / Tema">
    <div class="fgrow">
      <div class="fg"><label>Data</label><input type="date" id="add-dt"></div>
      <div class="fg"><label>Mídia</label><select id="add-mi"><option value="">—</option><option>Stories</option><option>Feed</option><option>Reels</option><option>TikTok</option><option>Carrossel</option></select></div>
    </div>
    <div class="fgrow">
      <div class="fg"><label>Funil</label><select id="add-fu"><option value="">—</option><option>Topo</option><option>Meio</option><option>Fundo</option></select></div>
      <div class="fg"><label>Mês</label><select id="add-ms">${M.map((m,i)=>`<option ${i===mes?'selected':''}>${m}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><label>Descrição</label><textarea id="add-dc" placeholder="Observações…"></textarea></div>
    <div class="pacts">
      <button class="pbtn pb-save" onclick="sAdd()">💾 Salvar</button>
      <button class="pbtn pb-cancel" onclick="closePanel()">Cancelar</button>
    </div>`);
}
async function sAdd(){
  const nm=document.getElementById('add-nm')?.value?.trim();if(!nm){toast('Preencha o título','err');return;}
  const dt=document.getElementById('add-dt')?.value,lid=LISTS[cli];
  try{toast('Criando…');await POST(`/list/${lid}/task`,{name:nm,parent:mid2,assignees:[parseInt(MID)],due_date:dt?new Date(dt).getTime():undefined,description:document.getElementById('add-dc')?.value||'',status:'planejamento'});closePanel();toast('Post criado!','ok');await syncData();}
  catch(e){toast('Erro: '+e.message,'err');}
}

function oMI(id){
  const m=mc[id];if(!m)return;
  const st=(m.status||'').toLowerCase(),stc=st.includes('planejamento')?'sp-plan':st.includes('design')?'sp-design':'sp-out';
  const subs=data[m.client]?.find(g=>g.m.id===id)?.subs||[],dt=fts(m.due_date);
  let h=`<div class="psub">${m.client}</div><div class="ptitle">${m.name}</div>
    <div class="ibox" style="margin-bottom:14px">
      <div class="ifield"><div class="iflbl">Status</div><div class="ifval"><span class="sp ${stc}">${m.status||'—'}</span></div></div>
      ${dt?`<div class="ifield"><div class="iflbl">Data</div><div class="ifval">${dt}</div></div>`:''}
    </div>`;
  if(m.description)h+=`<div class="descbox"><div class="desclbl">Descrição</div><div class="desctxt">${m.description.replace(/</g,'&lt;')}</div></div>`;
  h+=`<div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Subtarefas (${subs.length})</div>
    <div class="ibox" style="margin-bottom:16px">
      ${subs.map(s=>{const dt2=fts(s.due_date);return`<button onclick="closePanel();setTimeout(()=>oSP('${s.id}'),300)" style="display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;color:#f0f0f0" onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background='none'">
        <span style="color:#60C8F5;font-size:14px">✎</span>
        <span style="flex:1;font-size:13px;font-weight:500">${s.name}</span>
        <span style="font-size:11px;color:#666">${dt2||'—'}</span>
        <span style="color:#444;font-size:14px">›</span>
      </button>`;}).join('')}
    </div>
    <button class="pbtn pb-cancel" onclick="closePanel()">Fechar</button>`;
  oPanel(h);
}

function openLinks(type){
  const url=type==='stories'
    ?'https://app.clickup.com/9013166822/v/dc/8ckm0q6-8513/8ckm0q6-8513'
    :'https://app.clickup.com/9013166822/v/dc/8ckm0q6-8513/8ckm0q6-8473';
  window.open(url,'_blank');
}

function sUndo(msg,action){
  clearTimeout(ut);ua=action;
  const bar=document.getElementById('undo'),prog=document.getElementById('uprog');
  document.getElementById('umsg').textContent=msg;
  prog.style.transition='none';prog.style.width='100%';
  bar.classList.add('show');
  setTimeout(()=>{prog.style.transition='width 10000ms linear';prog.style.width='0%';},30);
  ut=setTimeout(()=>{bar.classList.remove('show');if(ua){ua();ua=null;}},10000);
}
function doUndo(){clearTimeout(ut);ua=null;document.getElementById('undo').classList.remove('show');toast('Desfeito','ok');}

function toast(msg,type=''){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;top:70px;right:16px;background:#111;border:1px solid #333;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:500;z-index:50;transition:opacity .3s;max-width:260px;pointer-events:none';
  t.textContent=msg;if(type==='ok')t.style.color='#22C55E';if(type==='err')t.style.color='#EF4444';
  document.body.appendChild(t);setTimeout(()=>t.style.opacity='0',2000);setTimeout(()=>t.remove(),2400);
}

function openCfg(){document.getElementById('cfg-bg').classList.add('open');}
function closeCfg(){document.getElementById('cfg-bg').classList.remove('open');}
function saveCfg(){const t=document.getElementById('cfg-tok').value.trim();if(!t){toast('Token inválido','err');return;}tok=t;localStorage.setItem('cu_tok_ciane',t);closeCfg();toast('Conectado!','ok');syncData();}

rWeek();syncData();
</script>
