<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Isadora — Planejamento Social</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#080808;--black2:#101010;--black3:#181818;--black4:#222;--black5:#2a2a2a;
  --yellow:#F5E642;
  --accent:#F472B6;--accent-dim:rgba(244,114,182,.1);--accent-border:rgba(244,114,182,.25);
  --white:#F5F5F0;--gray:#888884;--gray2:#444440;
  --ok:#22C55E;--warn:#F59E0B;--danger:#EF4444;--purple:#A78BFA;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --fd:'Bebas Neue',sans-serif;--fb:'Inter',sans-serif;--r:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px;height:100%}
body{background:var(--black);color:var(--white);font-family:var(--fb);min-height:100dvh;overflow-x:hidden}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--black);z-index:50}
.brand{display:flex;align-items:center;gap:10px}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:.04em;line-height:1}
.logo em{color:var(--yellow);font-style:normal}
.tag{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);border-left:1px solid var(--gray2);padding-left:8px;line-height:1.5}
.hdr-right{display:flex;align-items:center;gap:8px}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:50px;padding:4px 10px 4px 4px}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:12px;font-weight:700;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--accent)}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--white);cursor:pointer;padding:7px 10px;font-size:13px;transition:background .15s;display:flex;align-items:center;gap:5px}
.icon-btn:hover,.icon-btn:active{background:var(--black4)}
.icon-btn svg{width:14px;height:14px}
.spin svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── WEEK NAV ── */
.week-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.week-nav{display:flex;align-items:center;background:var(--black3);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.week-nav button{background:none;border:none;color:var(--gray);cursor:pointer;padding:7px 12px;font-size:16px;transition:all .15s;line-height:1;touch-action:manipulation}
.week-nav button:active{background:var(--black4)}
.week-label{font-size:13px;font-weight:600;color:var(--white);padding:0 10px;white-space:nowrap}
.week-hint{font-size:11px;color:var(--gray)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.stat{background:var(--black3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.stat-l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:4px}
.stat-v{font-family:var(--fd);font-size:28px;line-height:1}
.c-acc{color:var(--accent)}.c-yel{color:var(--yellow)}.c-ok{color:var(--ok)}.c-warn{color:var(--warn)}

/* ── PROGRESS ── */
.prog{padding:0 16px 12px}
.prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:6px}
.prog-top b{color:var(--white)}
.prog-bar{height:4px;background:var(--black5);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--yellow));border-radius:99px;transition:width .5s}

/* ── TABS ── */
.tabs{display:flex;gap:4px;padding:0 16px 12px}
.tab{font-size:13px;font-weight:500;padding:7px 16px;border-radius:8px;border:1px solid transparent;cursor:pointer;color:var(--gray);background:none;transition:all .15s;touch-action:manipulation}
.tab.active{background:var(--black3);border-color:var(--border2);color:var(--white)}

/* ── MAIN LIST ── */
.main-list{padding:0 16px 80px}

/* ── CLIENT BLOCK ── */
.client-block{margin-bottom:12px;background:var(--black3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.client-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;touch-action:manipulation;user-select:none}
.client-hdr:active{background:var(--black4)}
.client-hdr-left{display:flex;align-items:center;gap:10px}
.client-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.client-title{font-family:var(--fd);font-size:22px;letter-spacing:.02em}
.client-sub{font-size:11px;color:var(--gray);margin-top:1px}
.client-badge{background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;border:1px solid var(--accent-border)}
.chevron{color:var(--gray);font-size:14px;transition:transform .2s;margin-left:4px}
.client-body{display:none;border-top:1px solid var(--border)}
.client-body.open{display:block}

/* ── TASK MÃE ── */
.task-mae{margin:10px 12px;background:var(--black4);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.task-mae-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 10px;gap:10px;cursor:pointer;touch-action:manipulation}
.task-mae-hdr:active{background:rgba(255,255,255,.03)}
.task-mae-icon{font-size:16px;margin-top:1px;flex-shrink:0}
.task-mae-info{flex:1}
.task-mae-name{font-size:14px;font-weight:600;color:var(--white);line-height:1.3;margin-bottom:4px}
.task-mae-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sp{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.sp-plan{background:rgba(245,158,11,.15);color:#F59E0B}
.sp-design{background:rgba(167,139,250,.15);color:#A78BFA}
.sp-ok{background:rgba(34,197,94,.15);color:#22C55E}
.sp-out{background:rgba(255,255,255,.07);color:var(--gray)}
.task-mae-toggle{color:var(--gray);font-size:12px;flex-shrink:0;transition:transform .2s;margin-top:2px}

/* ── SUBTAREFAS LISTA ESTILO CLICKUP ── */
.subs-section{border-top:1px solid var(--border);padding:8px 0}
.subs-section-title{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.1em;padding:4px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.subs-section-title span{cursor:pointer;color:var(--accent);font-size:11px;font-weight:600}

.sub-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;touch-action:manipulation}
.sub-item:last-child{border-bottom:none}
.sub-item:active{background:rgba(255,255,255,.04)}
.sub-item-icon{color:var(--accent);font-size:14px;flex-shrink:0;opacity:.7}
.sub-item-body{flex:1;min-width:0}
.sub-item-name{font-size:13px;font-weight:500;color:var(--white);line-height:1.3;margin-bottom:3px}
.sub-item-tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag-date{font-size:11px;color:var(--gray)}
.tag-date.empty{color:var(--danger)}
.tag-midia{font-size:11px;color:var(--accent)}
.tag-midia.empty{color:var(--danger)}
.sub-item-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:11px;font-weight:700;flex-shrink:0}
.sub-item-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sab{background:none;border:none;color:var(--gray);cursor:pointer;padding:6px;border-radius:6px;font-size:14px;touch-action:manipulation;transition:color .15s}
.sab:active{color:var(--white)}
.sab.design-btn{color:var(--purple);font-size:10px;font-weight:700;border:1px solid rgba(167,139,250,.25);background:rgba(167,139,250,.08);border-radius:6px;padding:4px 7px}
.sab.design-btn:active{background:rgba(167,139,250,.2)}

.add-sub-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;color:var(--gray);font-size:13px;border-top:1px solid rgba(255,255,255,.04);touch-action:manipulation;transition:color .15s}
.add-sub-btn:active{color:var(--white)}
.add-sub-btn svg{flex-shrink:0}

/* ── DRAWER (painel lateral/bottom sheet) ── */
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;backdrop-filter:blur(4px)}
.drawer-bg.open{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--black2);border-radius:20px 20px 0 0;border:1px solid var(--border2);z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92dvh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:12px auto 0}
.drawer-content{padding:16px 20px 24px}

/* Drawer: tarefa mãe */
.dm-breadcrumb{font-size:11px;color:var(--gray);margin-bottom:8px}
.dm-breadcrumb span{color:var(--accent)}
.dm-title{font-size:20px;font-weight:700;color:var(--white);margin-bottom:14px;line-height:1.3}
.dm-fields{display:flex;flex-direction:column;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.dm-field{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border)}
.dm-field:last-child{border-bottom:none}
.dm-field-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.dm-field-label{font-size:12px;color:var(--gray);min-width:90px;flex-shrink:0}
.dm-field-val{font-size:13px;color:var(--white);font-weight:500;flex:1}
.dm-desc{background:var(--black3);border-radius:10px;padding:14px;margin-bottom:16px}
.dm-desc-title{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.dm-desc-body{font-size:14px;color:var(--white);line-height:1.6}
.dm-subs-title{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.dm-sub-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--black3);border-radius:8px;margin-bottom:6px;cursor:pointer;touch-action:manipulation;transition:background .15s}
.dm-sub-item:active{background:var(--black4)}
.dm-sub-name{flex:1;font-size:13px;color:var(--white);font-weight:500}
.dm-sub-date{font-size:11px;color:var(--gray)}

/* Drawer: subtarefa (edit) */
.dsub-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.dsub-client{font-size:11px;color:var(--accent);margin-bottom:8px}
.dsub-title-input{font-size:18px;font-weight:700;color:var(--white);background:none;border:none;outline:none;width:100%;border-bottom:1px solid var(--border2);padding-bottom:10px;margin-bottom:16px;font-family:var(--fb)}
.dsub-title-input::placeholder{color:var(--gray)}
.dfield{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.dfield label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.08em}
.dfield input,.dfield select,.dfield textarea{background:var(--black3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--white);font-family:var(--fb);outline:none;transition:border-color .2s;width:100%}
.dfield input:focus,.dfield select:focus,.dfield textarea:focus{border-color:var(--accent)}
.dfield select option{background:var(--black3)}
.dfield textarea{resize:none;min-height:80px;line-height:1.5}
.dfield-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.drawer-actions{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.dact-btn{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s;touch-action:manipulation;font-family:var(--fb)}
.dact-btn:active{opacity:.8}
.dact-save{background:var(--accent);color:var(--black)}
.dact-design{background:rgba(167,139,250,.15);color:#A78BFA;border:1px solid rgba(167,139,250,.3) !important;border-radius:10px}
.dact-dup{background:var(--black3);color:var(--white);border:1px solid var(--border2) !important;border-radius:10px}
.dact-del{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.25) !important;border-radius:10px}
.dact-cancel{background:none;color:var(--gray);border:1px solid var(--border2) !important;border-radius:10px}

/* Assign options */
.assign-list{display:flex;flex-direction:column;gap:8px;margin:12px 0 20px}
.assign-opt{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--black3);border:1px solid var(--border2);border-radius:10px;cursor:pointer;touch-action:manipulation;transition:all .15s}
.assign-opt:active,.assign-opt.sel{border-color:var(--accent);background:var(--accent-dim)}
.assign-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.assign-name{font-size:14px;font-weight:500}

/* Dup date */
.dup-hint{font-size:13px;color:var(--gray);margin-bottom:14px}

/* ── UNDO BAR ── */
.undo-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);opacity:0;background:var(--black2);border:1px solid var(--border2);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:14px;z-index:300;transition:all .35s cubic-bezier(.32,.72,0,1);pointer-events:none;min-width:min(340px,90vw)}
.undo-bar.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:all}
.undo-msg{font-size:13px;color:var(--white);flex:1}
.undo-btn-el{font-size:12px;font-weight:700;color:var(--accent);background:none;border:1px solid var(--accent-border);border-radius:7px;padding:6px 14px;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.undo-prog{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);border-radius:0 0 14px 14px;transition:width linear}

/* ── CFG ── */
.cfg-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;align-items:center;justify-content:center;padding:20px}
.cfg-bg.open{display:flex}
.cfg-box{background:var(--black2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:400px}
.cfg-box h3{font-family:var(--fd);font-size:24px;margin-bottom:6px}
.cfg-box p{font-size:13px;color:var(--gray);margin-bottom:16px;line-height:1.6}
.cfg-box input{width:100%;background:var(--black3);border:1px solid var(--border2);border-radius:8px;padding:11px 12px;font-size:14px;color:var(--white);outline:none;font-family:var(--fb);margin-bottom:12px;transition:border-color .15s}
.cfg-box input:focus{border-color:var(--accent)}
.cfg-actions{display:flex;gap:8px;justify-content:flex-end}
.cfg-btn{font-size:13px;padding:9px 18px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--white);cursor:pointer;font-family:var(--fb)}
.cfg-btn.save{background:var(--accent);color:var(--black);border-color:var(--accent);font-weight:700}

/* ── EMPTY/LOADING ── */
.empty{text-align:center;padding:40px 20px;color:var(--gray);font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}

/* ── CALENDAR ── */
.cal-wrap{padding:0 16px 80px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-col{background:var(--black3);border:1px solid var(--border);border-radius:10px;min-height:100px;overflow:hidden}
.cal-col.today{border-color:var(--accent)}
.cal-col-hdr{padding:7px 8px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center}
.cal-dn{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray)}
.cal-num{font-family:var(--fd);font-size:18px;line-height:1}
.cal-col.today .cal-num{color:var(--accent)}
.cal-cards{padding:4px;display:flex;flex-direction:column;gap:3px}
.cal-card{background:var(--black4);border-radius:5px;padding:4px 6px;font-size:10px;border-left:2px solid var(--accent);cursor:pointer;touch-action:manipulation}
.cal-card:active{background:var(--black5)}
.cal-cli{font-weight:700;color:var(--accent);font-size:9px}
.cal-nm{color:var(--white);line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

@media(min-width:600px){
  .drawer{left:auto;right:0;top:0;bottom:0;border-radius:0;max-width:420px;max-height:100dvh;transform:translateX(100%)}
  .drawer.open{transform:translateX(0)}
  .drawer-handle{display:none}
  .cal-grid{grid-template-columns:repeat(7,1fr)}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="brand">
    <div class="logo">DUA<em>*.*</em></div>
    <div class="tag">Marketing<br>de Moda</div>
  </div>
  <div class="hdr-right">
    <div class="user-chip">
      <div class="avatar" style="background:var(--accent);color:var(--black)">IS</div>
      <span class="user-name">Isadora</span>
    </div>
    <button class="icon-btn" id="sync-btn" onclick="syncData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <button class="icon-btn" onclick="openCfg()">🔑</button>
  </div>
</header>

<!-- WEEK NAV -->
<div class="week-bar">
  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="week-label">—</span>
    <button onclick="changeWeek(1)">›</button>
  </div>
  <span class="week-hint">Ter → Seg</span>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-l">Clientes</div><div class="stat-v c-acc" id="s-cli">—</div></div>
  <div class="stat"><div class="stat-l">Posts</div><div class="stat-v c-yel" id="s-posts">—</div></div>
  <div class="stat"><div class="stat-l">Agendados</div><div class="stat-v c-ok" id="s-ag">—</div></div>
  <div class="stat"><div class="stat-l">Pendentes</div><div class="stat-v c-warn" id="s-pend">—</div></div>
</div>
<div class="prog">
  <div class="prog-top"><b>Progresso</b><span id="prog-pct">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setTab('lista',this)">Lista</button>
  <button class="tab" onclick="setTab('calendario',this)">Calendário</button>
</div>

<!-- VIEWS -->
<div id="view-lista" class="main-list"></div>
<div id="view-cal" class="cal-wrap" style="display:none"></div>

<!-- DRAWER BG -->
<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-content" id="drawer-content"></div>
</div>

<!-- CFG -->
<div class="cfg-bg" id="cfg-bg">
  <div class="cfg-box">
    <h3>Configure o ClickUp</h3>
    <p>Cole seu token abaixo. Fica salvo no navegador.</p>
    <input type="password" id="cfg-token" placeholder="pk_...">
    <div class="cfg-actions">
      <button class="cfg-btn" onclick="closeCfg()">Cancelar</button>
      <button class="cfg-btn save" onclick="saveCfg()">Salvar</button>
    </div>
  </div>
</div>

<!-- UNDO -->
<div class="undo-bar" id="undo-bar">
  <span class="undo-msg" id="undo-msg">Ação realizada</span>
  <button class="undo-btn-el" onclick="doUndo()">↩ Desfazer</button>
  <div class="undo-prog" id="undo-prog" style="width:100%"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────
const MEMBER_ID = '112051789';
const MEMBER_NAME = 'Isadora';
const MEMBER_COLOR = '#F472B6';

const ALL_LISTS = {
  'Andirá Jeans':'901324614041','Amiche':'901324613220','Del Carmen':'901324614474',

// ─── WEEK ─────────────────────────────────────
function getWeekRange(off=0){
  const t=new Date(), dow=t.getDay();
  let d=dow-2; if(d<0)d+=7;
  const tue=new Date(t); tue.setDate(t.getDate()-d+off*7); tue.setHours(0,0,0,0);
  const mon=new Date(tue); mon.setDate(tue.getDate()+6);
  return {start:tue,end:mon};
}
const fmt2=(d)=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
const fmtTs=(ts)=>ts?new Date(parseInt(ts)).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):null;
const tsToInput=(ts)=>ts?new Date(parseInt(ts)).toISOString().split('T')[0]:'';
function renderWeekLabel(){const {start,end}=getWeekRange(weekOff);document.getElementById('week-label').textContent=`${fmt2(start)} → ${fmt2(end)}`;}
function changeWeek(d){weekOff+=d;renderWeekLabel();syncData();}

// ─── API ──────────────────────────────────────
const apiBase='https://api.clickup.com/api/v2';
async function apiGet(p){const r=await fetch(apiBase+p,{headers:{Authorization:token}});if(!r.ok)throw new Error(`CU ${r.status}`);return r.json();}
async function apiPost(p,b){const r=await fetch(apiBase+p,{method:'POST',headers:{Authorization:token,'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok){const e=await r.json();throw new Error(e.err||`CU ${r.status}`);}return r.json();}
async function apiPut(p,b){const r=await fetch(apiBase+p,{method:'PUT',headers:{Authorization:token,'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok){const e=await r.json();throw new Error(e.err||`CU ${r.status}`);}return r.json();}
async function apiDel(p){await fetch(apiBase+p,{method:'DELETE',headers:{Authorization:token}});}

// ─── CUSTOM FIELDS ────────────────────────────
function parseCF(fields){
  const r={midia:null,funil:null,mes:null};
  for(const f of fields){
    const nm=(f.name||'').toLowerCase();
    const getOpt=()=>f.type_config?.options?.find(o=>o.id===f.value)?.name||f.value||null;
    if(nm.includes('mídia')||nm.includes('midia')||nm==='media') r.midia=getOpt();
    if(nm==='funil') r.funil=getOpt();
    if(nm.includes('mês')||nm.includes('mes')) r.mes=getOpt();
  }
  return r;
}

// ─── SYNC ─────────────────────────────────────
async function syncData(){
  if(!token){openCfg();return;}
  document.getElementById('view-lista').innerHTML='<div class="empty"><div class="spinner"></div><div style="margin-top:8px">Buscando tarefas…</div></div>';
  document.getElementById('sync-btn').classList.add('spin');
  allData={}; cache={}; motherCache={};

  await Promise.all(MY_CLIENTS.map(async client=>{
    const listId=ALL_LISTS[client]; if(!listId)return;
    try{
      const [r1,r2]=await Promise.all([
        apiGet(`/list/${listId}/task?include_closed=false`),
        apiGet(`/list/${listId}/task?subtasks=true&include_closed=false`)
      ]);
      const allTasks=r2.tasks||[];

      const mothers=(r1.tasks||[]).filter(t=>{
        const st=(t.status?.status||'').toLowerCase();
        const nm=t.name.toLowerCase();
        return !nm.includes('[template]')&&!nm.includes('template')&&
               (st.includes('planejamento')||st.includes('planning'))&&
               !t.parent&&
               (t.assignees||[]).some(a=>String(a.id)===MEMBER_ID);
      });

      for(const m of mothers){
        const subs=allTasks
          .filter(t=>{
            const st=(t.status?.status||'').toLowerCase();
            return t.parent===m.id&&
                   !IGNORE_ST.some(s=>st.includes(s))&&
                   !t.name.toLowerCase().includes('[template]');
          })
          .sort((a,b)=>(a.due_date?parseInt(a.due_date):Infinity)-(b.due_date?parseInt(b.due_date):Infinity));

        // Cache mãe
        motherCache[m.id]={
          id:m.id, name:m.name, status:m.status?.status||'',
          due_date:m.due_date, description:m.description||'',
          assignees:m.assignees||[], client, listId
        };

        // Cache subs
        for(const s of subs){
          const cf=parseCF(s.custom_fields||[]);
          cache[s.id]={
            id:s.id, name:s.name, status:s.status?.status||'',
            dueDateRaw:s.due_date, midia:cf.midia, funil:cf.funil, mes:cf.mes,
            desc:s.description||'', client, parentId:m.id, listId
          };
        }

        allData[client]=allData[client]||[];
        allData[client].push({mother:m, subtasks:subs});
      }
    }catch(e){console.warn(client,e.message);}
  }));

  document.getElementById('sync-btn').classList.remove('spin');
  renderStats(); renderView();
  toast('Atualizado!','ok');
}

    posts+=g.subtasks.length;
    ag+=g.subtasks.filter(s=>{const st=(s.status?.status||'').toLowerCase();return st.includes('agendamento')||st.includes('conclu');}).length;
  }
  document.getElementById('s-cli').textContent=clis.length;
  document.getElementById('s-posts').textContent=posts;
  document.getElementById('s-ag').textContent=ag;
  document.getElementById('s-pend').textContent=posts-ag;
  const pct=posts?Math.round(ag/posts*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
}

// ─── CALENDAR ─────────────────────────────────
function renderCal(){
  const el=document.getElementById('view-cal');
  const {start}=getWeekRange(weekOff);
  const today=new Date();today.setHours(0,0,0,0);
  const days=[]; for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);days.push(d);}
  const byDay={};
  for(const c of MY_CLIENTS) for(const {subtasks} of (allData[c]||[])) for(const s of subtasks){
    if(!s.due_date)continue;
    const k=new Date(parseInt(s.due_date)).toDateString();
    byDay[k]=byDay[k]||[]; byDay[k].push({s,client:c});
  }
  const dns=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let html='<div class="cal-grid">';
  for(const d of days){
    const k=d.toDateString(), isT=d.getTime()===today.getTime();
    const ts=byDay[k]||[];
    html+=`<div class="cal-col ${isT?'today':''}">
      <div class="cal-col-hdr"><span class="cal-dn">${dns[d.getDay()]}</span><span class="cal-num">${d.getDate()}</span></div>
      <div class="cal-cards">`;
    if(!ts.length) html+=`<div style="font-size:10px;color:#444440;padding:4px 6px">—</div>`;
    for(const {s,client} of ts){
      html+=`<div class="cal-card" onclick="openDrawerSub('${s.id}')">
        <div class="cal-cli">${client}</div>
        <div class="cal-nm">${s.name}</div>
      </div>`;
    }
    html+=`</div></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

  drawerMode='add'; drawerMotherId=parentId;
  const mes=new Date().getMonth();
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const html=`
    <div class="dm-title" style="font-size:18px;margin-bottom:14px">+ Novo post</div>
    <div class="dfield"><label>Título / Tema <span style="color:var(--danger)">*</span></label>
      <input type="text" id="add-name" placeholder="Ex: Look verão outono">
    </div>
    <div class="dfield-row">
      <div class="dfield"><label>Data</label><input type="date" id="add-date"></div>
      <div class="dfield"><label>Mídia</label>
        <select id="add-midia"><option value="">—</option>${['Stories','Feed','Reels','TikTok','Carrossel'].map(m=>`<option>${m}</option>`).join('')}</select>
      </div>
    </div>
    <div class="dfield-row">
      <div class="dfield"><label>Funil</label>
        <select id="add-funil"><option value="">—</option>${['Topo','Meio','Fundo'].map(f=>`<option>${f}</option>`).join('')}</select>
      </div>
      <div class="dfield"><label>Mês</label>
        <select id="add-mes">${meses.map((m,i)=>`<option ${i===mes?'selected':''}>${m}</option>`).join('')}</select>
      </div>
    </div>
    <div class="dfield"><label>Descrição</label>
      <textarea id="add-desc" placeholder="Referências, copy, observações…"></textarea>
    </div>
    <button class="dact-btn dact-save" style="margin-top:16px" onclick="saveNewSub('${parentId}','${client}')">💾 Salvar no ClickUp</button>
    <button class="dact-btn dact-cancel" style="margin-top:8px" onclick="closeDrawer()">Cancelar</button>`;
  openDrawer(html);
}
async function saveNewSub(parentId,client){
  const name=document.getElementById('add-name')?.value?.trim();
  if(!name){toast('Preencha o título','err');return;}
  const date=document.getElementById('add-date')?.value;
  const desc=document.getElementById('add-desc')?.value||'';
  const listId=ALL_LISTS[client];
  try{
    toast('Criando post…');
    await apiPost(`/list/${listId}/task`,{
      name, parent:parentId, assignees:[parseInt(MEMBER_ID)],
      due_date:date?new Date(date).getTime():undefined,
      description:desc, status:'planejamento'
    });
    closeDrawer(); toast('Post criado!','ok'); await syncData();
  }catch(e){toast('Erro: '+e.message,'err');}
}

// ─── DELETE ───────────────────────────────────
function confirmDelete(id){
  const s=cache[id];
  scheduleUndo(`"${s?.name||'Post'}" excluído`,async()=>{
    await apiDel(`/task/${id}`);
    await syncData();
  });
}

// ─── UNDO ─────────────────────────────────────
const UNDO_MS=10000;
function scheduleUndo(msg,action){
  clearTimeout(undoTimer);
  undoAction=action;
  const bar=document.getElementById('undo-bar');
  const prog=document.getElementById('undo-prog');
  document.getElementById('undo-msg').textContent=msg;
  prog.style.transition='none'; prog.style.width='100%';
  bar.classList.add('show');
  setTimeout(()=>{prog.style.transition=`width ${UNDO_MS}ms linear`;prog.style.width='0%';},30);
  undoTimer=setTimeout(()=>{bar.classList.remove('show');if(undoAction){undoAction();undoAction=null;}},UNDO_MS);
}
function doUndo(){
  clearTimeout(undoTimer);
  undoAction=null;
  document.getElementById('undo-bar').classList.remove('show');
  toast('Ação desfeita','ok');
}

// ─── TOAST ────────────────────────────────────
function toast(msg,type=''){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;top:80px;right:16px;background:#101010;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:500;z-index:500;transition:opacity .3s;pointer-events:none;max-width:280px';
  t.textContent=msg;
  if(type==='ok')t.style.color='#22C55E';
  if(type==='err')t.style.color='#EF4444';
  document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='0',2000);
  setTimeout(()=>t.remove(),2400);
}

// ─── CFG ──────────────────────────────────────
function openCfg(){document.getElementById('cfg-bg').classList.add('open');}
function closeCfg(){document.getElementById('cfg-bg').classList.remove('open');}
function saveCfg(){
  const t=document.getElementById('cfg-token').value.trim();
  if(!t){toast('Token inválido','err');return;}
  token=t; localStorage.setItem('cu_token_isadora',t);
  closeCfg(); toast('Conectado!','ok'); syncData();
}

// ─── INIT ─────────────────────────────────────
renderWeekLabel();
if(token) syncData();
else document.getElementById('view-lista').innerHTML='<div class="empty">Configure seu token 🔑</div>';
</script>
</body>
